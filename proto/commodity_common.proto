// 商品奖励信息 (用于商品发放/回收/冻结等操作)
message CommodityReward {
  // 商品类型
  CommodityType commodity_type = 2;
  // 商品ID
  int64 commodity_id           = 3;
  // 数量, 仅表示数量
  // Note: 若商品数据时长类，则本字段会被忽略(值必然为1)
  int64 count                  = 4;
  // 有效期, 单位: 秒
  // Note: 表示
  int64 expire_second          = 5;
}
